<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- 背景圓角方形（sakura-500 粉色） -->
  <rect width="512" height="512" rx="112" fill="#ec4899"/>
  <!-- 白色主體圓 -->
  <circle cx="256" cy="256" r="160" fill="white" opacity="0.15"/>
  <!-- 五瓣櫻花 -->
  <!-- 花瓣 1 (上) -->
  <ellipse cx="256" cy="152" rx="36" ry="60" fill="white" opacity="0.95"/>
  <!-- 花瓣 2 (右上) -->
  <ellipse cx="256" cy="152" rx="36" ry="60" fill="white" opacity="0.95" transform="rotate(72 256 256)"/>
  <!-- 花瓣 3 (右下) -->
  <ellipse cx="256" cy="152" rx="36" ry="60" fill="white" opacity="0.95" transform="rotate(144 256 256)"/>
  <!-- 花瓣 4 (左下) -->
  <ellipse cx="256" cy="152" rx="36" ry="60" fill="white" opacity="0.95" transform="rotate(216 256 256)"/>
  <!-- 花瓣 5 (左上) -->
  <ellipse cx="256" cy="152" rx="36" ry="60" fill="white" opacity="0.95" transform="rotate(288 256 256)"/>
  <!-- 花心 -->
  <circle cx="256" cy="256" r="32" fill="#ec4899"/>
  <circle cx="256" cy="256" r="18" fill="white" opacity="0.8"/>
</svg>
